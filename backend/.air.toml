root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server/main.go"
  bin = "tmp/server"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = [".*_test.go"]
  exclude_unchanged = true
  log = "build-errors.log"
  poll = false
  send_interrupt = true
  kill_delay = "1s"
  delay = 0

[log]
  main_only = false

[color]
  main = "cyan"
  build = "yellow"
  runner = "green"
